<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c3310" />
  <title>Agronow — Offline</title>
  <link rel="icon" type="image/png" href="/icon-192x192.png" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      font-family: "Poppins", system-ui, -apple-system, sans-serif;
      color: #fff; text-align: center;
      background: radial-gradient(120% 90% at 50% 0%, #0c3310 0%, #19191B 70%);
    }
    .card {
      max-width: 380px; width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px; padding: 36px 28px;
      backdrop-filter: blur(8px);
    }
    img { width: 72px; height: 72px; border-radius: 18px; margin-bottom: 18px; }
    h1 { font-size: 20px; margin: 0 0 8px; font-weight: 700; }
    p { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.65); margin: 0 0 22px; }
    button {
      border: 0; cursor: pointer;
      background: linear-gradient(to right, #10b981, #16a34a);
      color: #fff; font-weight: 600; font-size: 14px;
      padding: 12px 22px; border-radius: 12px;
    }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#f59e0b; margin-right:6px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192x192.png" alt="Agronow" />
    <h1>Kamu sedang offline</h1>
    <p><span class="dot"></span>Tidak ada koneksi internet. Sambungkan kembali lalu coba lagi untuk mengakses Agronow.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
